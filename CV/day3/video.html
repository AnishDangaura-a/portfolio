<!DOCTYPE html>
<html>
<head>
<style>
    table {
        font-family: serif;
        border-collapse: separate; /* Keeps cells distinct like the image */
        border-spacing: 3px;
        width: 100%;
        max-width: 600px;
        border: 1px solid black; /* Outer border */
        padding: 2px;
    }

    th, td {
        border: 1px solid black;
        text-align: center;
        padding: 15px;
        vertical-align: middle;
    }

    th {
        font-size: 1.5em;
        font-weight: bold;
        color: #000;
    }

    /* Styling for the specific text logic inside cells */
    .span-text {
        display: block;
        font-size: 1.3em;
        color: #003366; /* Dark blue/black shade */
        font-weight: bold;
        margin-bottom: 5px;
    }

    .sub-text {
        font-size: 0.9em;
        color: #000;
    }
</style>
</head>
