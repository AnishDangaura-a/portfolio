<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="styles.css">
   
    
</head>
<body>

    <!-- for content -->

<div class="container">
    <div class="form-section">
        <h1>Welcome Back</h1><br>
        <p class="subtitle">Welcome back! Please enter your details.</p> <br><br>

        <form>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email">
            </div><br>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="**********">
            </div><br>

            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot password</a>
            </div>

            <button type="submit" class="btn btn-red">Sign in</button> <br><br>
            <button type="button" class="btn btn-google">
                Sign in with Google
            </button> <br>
        </form>

        <p class="signup-text">Don't have an account? <a href="#">Sign up for free!</a></p>
    </div>


    <!-- for image -->

    <div class="image-section">
        <img src="Player.png" alt="Nike Illustration">
    </div>
</div>

</body>
</html>
