<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div  class="calculator">

        <div class="display"><span style="color: rgb(60, 162, 128); font-size: 20px;">100*</span> <br> 50</div>

        <div class="buttons">
            <button class="c">C</button>
            <button class="del">del</button>
            <button class="operator">%</button>
            <button class="operator">/</button>
            
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">x</button>
            
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>
            
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>
            
            <button class="dot">.</button>
            <button class="zero">0</button>
            <button>-</button>
            <button class="operator">=</button>

        </div>

        <p>Created by Anish Dangaura @Feb 2026</p>
    </div>
</body>
</html>
