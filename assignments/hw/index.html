<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        
        <div class="btn circle neu-out"><i class="fa fa-user"></i></div>
        <div class="btn circle neu-out"><i class="fa fa-star"></i></div>
        <div class="btn circle neu-out"><i class="fa fa-search"></i></div>
        
        <div class="btn circle neu-in"><i class="fa fa-heart"></i></div>
        
        <div class="btn square neu-in"><i class="fa fa-heart"></i></div>
        
        <div class="btn circle neu-in" style="width: 50px; height: 50px;"><i class="fa fa-heart"></i></div>

        <div class="btn pill-btn neu-out">FOLLOW</div>

        <div class="row-break"></div>

        <div class="input-wrapper">
            <input type="text" class="input-field neu-in" placeholder="">
            <i class="fa fa-search input-icon"></i>
        </div>

        <div class="btn circle neu-out" style="width: 50px; height: 50px;"><i class="fa fa-bookmark"></i></div>
        <div class="btn circle neu-out" style="width: 50px; height: 50px;"><i class="fa fa-stop"></i></div>

        <div class="toggle neu-in"></div>

        <div class="vertical-slider-container">
            <div class="slider-track neu-in">
                <div class="slider-thumb neu-out"></div>
            </div>
            <div class="slider-track neu-in">
                </div>
        </div>

        <div class="row-break"></div>

        <div class="input-wrapper">
            <input type="password" class="input-field neu-in" placeholder="PASSWORD">
        </div>

        <div class="btn circle neu-out" style="width: 50px; height: 50px;"><i class="fa fa-star"></i></div>
        <div class="btn circle neu-out" style="width: 50px; height: 50px;"><i class="fa fa-home"></i></div>

        <div class="toggle neu-in active"></div>

        <div class="row-break"></div>

        <div class="chat-bubble neu-out">
            <i class="fa fa-comment"></i>
            <i class="fa fa-user"></i>
        </div>

        <div class="chat-bubble neu-out" style="width: 80px; justify-content: center;">
            <i class="fa fa-heart text-purple"></i>
        </div>

        <div class="btn square neu-out" style="border-radius: 15px;"><i class="fa fa-bars"></i></div>

        <div class="horizontal-slider neu-in">
            <div class="progress-fill"></div>
        </div>

    </div>
</body>
</html>
