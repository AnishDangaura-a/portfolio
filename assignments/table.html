<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>

    <style>
        table,th,td{
            border: 2px,solid;
            width: 30%;
            
            

        }
    </style>
</head>
<body>
    <table border="1" cellspacing="5" cellpadding="10">

    <!-- Row 1: Headers -->
    <tr>
        <th>Header</th>
        <th>Header</th>
        <th>Header</th>
        <th>Header</th>
    </tr>

    <!-- Row 2 -->
    <tr>
        <!-- Left big rowspan -->
        <td rowspan="4" align="center">
            <b>span</b><br>rows
        </td>

        <!-- Top span columns -->
        <td colspan="3" align="center">
            <b>span</b> columns
        </td>
    </tr>

    <!-- Row 3 -->
    <tr>
        <td colspan="2" align="center">
            <b>span</b> columns
        </td>

        <!-- Right big rowspan -->
        <td rowspan="3" align="center">
            <b>span</b><br>both
        </td>
    </tr>

    <!-- Row 4 -->
    <tr>
        <!-- Middle left rowspan -->
        <td rowspan="2" align="center">
            <b>span</b><br>rows
        </td>

        <td align="center">
            <b>span</b> columns
        </td>
    </tr>

    <!-- Row 5 -->
    <tr>
        <td align="center">
            <b>span</b><br>both
        </td>
    </tr>

</table>

</body>
</html>
