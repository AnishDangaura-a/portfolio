<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* CSS position types

        1.static(default position)
        2.relative
        3.absolute
        4.fixed
        5.sticky */

        .position{
            /* display: flex; */
            border: 4px solid red;

        }

        .child{
            height: 250px;
            width: 250px;
            border: 2px solid;
            text-align: center;
            align-content: center;
            font-size: 3rem;
            
        }

        #static{
            position: static;
            margin-top: 100px;
        }

        #relative{
            position: relative;
            background-color: greenyellow;
            top: 100px;
        }
        #absolute{
            position: absolute;
            background-color: lightgoldenrodyellow;
            /* top: 0;
            bottom: 0; */
            right: 0;


        }

        #fixed{
            position: fixed;
            background: lightpink;
            bottom: 0;
            right: 0;
        }

        #sticky{
            background-color: antiquewhite;
            top: 200px;
        }

        
    </style>
</head>
<body>
    <div class="position">
        <div class="child" id="static">static</div>
        <div class="child" id="relative">relative</div>
        <div class="child" id="absolute">absolute</div>
        <div class="child" id="fixed"fixed>fixed</div>
        <div class="child" id="sticky">sticky</div>
    </div>
    
</body>
</html>
