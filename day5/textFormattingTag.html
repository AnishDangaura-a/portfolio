<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting Tag</title>
</head>
<body>
    <b>This is bold</b>

    <p>My name is <b>Anish </b></p>
    <strong>This is strong Tag</strong>

    <big>This is big Text</big><br>
    <small>This is small</small>
    <i>This is text</i>
    <em>This is emphosis</em>

    <mark>This is mark</mark>
    <del>this is del tag</del>
    <u>this is for underline</u>
    (a<sup>2</sup>-b <sup>2</sup>)
</body>
</html>
