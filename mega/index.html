<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="utility-bar">
    <div class="container">
        <div class="welcome-msg">Welcome to worldwide Megamart!</div>
        <div class="utility-links">
            <span>Deliver to <strong>423651</strong></span>
            <span>Track your order</span>
            <span>All Offers</span>
        </div>
    </div>
</div>

<header class="main-header">
    <div class="container flex-row">
        <div class="logo">MegaMart</div>
        <div class="search-container">
            <input type="text" placeholder="Search essentials, groceries and more...">
        </div>
        <div class="user-actions">
            <span class="action-item">Sign Up/Sign In</span>
            <span class="action-item">Cart</span>
        </div>
    </div>
</header>

<nav class="category-nav">
    <div class="container">
        <ul class="category-list">
            <li class="active">Groceries</li>
            <li>Premium Fruits</li>
            <li>Home & Kitchen</li>
            <li>Fashion</li>
            <li>Electronics</li>
            <li>Beauty</li>
        </ul>
    </div>
</nav>

<section class="hero-section">
    <div class="container">
        <div class="hero-banner">
            <div class="hero-text">
                <p>Best Deal Online on smart watches</p>
                <h1>SMART WEARABLE.</h1>
                <h2>UP TO 80% OFF</h2>
            </div>
            <div class="hero-image">
                <div class="watch-placeholder"></div>
            </div>
        </div>
    </div>
</section>
    
</body>
</html>
