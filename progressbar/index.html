<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Bar Animation</title>
    <style>
        .parent {
            width: 80%;
            max-width: 600px;
            text-align: center;
        }

        .child {
            color:  black;
            margin-bottom: 10px;
        }


        .progress-bar {
            background-color:  white;
            border-radius: 20px;
            height: 30px;
            width: 100%;

        }


        .progress-fill {
            background-color: green; 
            height: 100%;
            width: 0%; 
            border-radius: 20px 0 0 20px;
            animation-duration: 2s;
            animation: fillBar 2s ease-out forwards;
            

        }


        @keyframes fillBar {
            0% {
                width: 0%;
            }

            5%{
                width: 5%;
            }

            15%{
                width: 5%;
            }

            25%{
                width: 25%;

            }

            35%{
                width: 35%;
            }

            50%{
                width: 50%;

            }
            60%{
                width: 60%;
            }

            75%{
                width: 75%;

            }

            80%{
                width: 80%;
            }
            100% {
                width: 100%; 
            }
        }
    </style>
</head>
<body>

    <div class="parent">
        <div class="child">Progress: 100%</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

</body>
</html>
